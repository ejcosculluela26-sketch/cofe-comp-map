<!DOCTYPE html>
<html>
<head>
    <title>COFE Properties Industrial Comp Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background:#0b1220; color:white; overflow: hidden; }

        /* ===== LEFT SIDEBAR ===== */
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 250px; z-index: 1000;
            background: #1e1e2e; border-right: 1px solid #2a2a3e;
            display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
        }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 4px; }
        .sb-header {
            padding: 18px 16px 14px; border-bottom: 1px solid #2a2a3e;
        }
        .sb-header h1 { margin: 0; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .sb-header .sb-sub { font-size: 10px; color: #6a6a8a; margin-top: 3px; letter-spacing: 0.3px; }
        .sb-section { padding: 14px 16px 10px; border-bottom: 1px solid #2a2a3e; }
        .sb-section-title {
            font-size: 10px; font-weight: 700; color: #6a6a8a; text-transform: uppercase;
            letter-spacing: 1.2px; margin-bottom: 10px;
        }
        /* Search in sidebar */
        .sb-search-wrap { display: flex; gap: 4px; }
        .sb-search-wrap input {
            flex: 1; padding: 7px 10px; font-size: 12px; border-radius: 6px;
            border: 1px solid #3a3a5c; background: #16162a; color: #e0e0e0;
            outline: none; transition: border-color 0.15s;
        }
        .sb-search-wrap input:focus { border-color: #3b82f6; }
        .sb-search-wrap input::placeholder { color: #5a5a7a; }
        .sb-search-wrap button {
            padding: 6px 10px; font-size: 11px; border-radius: 6px;
            border: 1px solid #3a3a5c; background: #2b5dbc; color: #fff; cursor: pointer;
            font-weight: 600; transition: background 0.15s;
        }
        .sb-search-wrap button:hover { background: #3b6dd0; }
        .sb-search-clear {
            padding: 4px 8px; font-size: 10px; border-radius: 4px;
            border: 1px solid #3a3a5c; background: transparent; color: #6a6a8a;
            cursor: pointer; margin-top: 6px; display: none;
        }
        .sb-search-clear:hover { color: #ef4444; border-color: #ef4444; }
        /* Market dropdown in sidebar */
        .sb-select {
            width: 100%; padding: 7px 10px; font-size: 12px; border-radius: 6px;
            border: 1px solid #3a3a5c; background: #16162a; color: #e0e0e0;
            outline: none; cursor: pointer;
        }
        .sb-select:focus { border-color: #3b82f6; }
        /* Layer toggles in sidebar */
        .sb-layer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 0; cursor: pointer; user-select: none; transition: opacity 0.15s;
        }
        .sb-layer:not(.active) { opacity: 0.35; }
        .sb-layer .sb-layer-left { display: flex; align-items: center; gap: 8px; }
        .sb-layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .sb-layer-name { font-size: 12px; color: #e0e0e0; }
        .sb-layer-count { font-size: 11px; color: #6a6a8a; font-variant-numeric: tabular-nums; }
        /* Tool toggles in sidebar */
        .sb-tool {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
        }
        .sb-tool-label { font-size: 12px; color: #e0e0e0; }
        .sb-toggle {
            position: relative; width: 38px; height: 20px; border-radius: 10px;
            background: #2a2a3e; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .sb-toggle.on { background: #3b82f6; }
        .sb-toggle.on.parcel { background: #00e5ff; }
        .sb-toggle.on.sv { background: #fbbf24; }
        .sb-toggle::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: transform 0.2s;
        }
        .sb-toggle.on::after { transform: translateX(18px); }
        /* Year multi-select dropdown */
        .yr-dropdown-wrap { position: relative; }
        .yr-dropdown-btn {
            width: 100%; padding: 7px 30px 7px 10px; font-size: 12px; border-radius: 6px;
            border: 1px solid #3a3a5c; background: #16162a; color: #e0e0e0;
            cursor: pointer; text-align: left; position: relative; appearance: none;
        }
        .yr-dropdown-btn::after {
            content: '\25BC'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            font-size: 8px; color: #6a6a8a; pointer-events: none;
        }
        .yr-dropdown-btn:hover { border-color: #5a5a7c; }
        .yr-dropdown-menu {
            display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: #16162a; border: 1px solid #3a3a5c; border-radius: 6px;
            max-height: 220px; overflow-y: auto; z-index: 1100; padding: 4px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .yr-dropdown-menu.open { display: block; }
        .yr-dropdown-menu::-webkit-scrollbar { width: 4px; }
        .yr-dropdown-menu::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 4px; }
        .yr-dd-actions { display: flex; gap: 4px; padding: 4px 8px 6px; border-bottom: 1px solid #2a2a3e; }
        .yr-dd-action {
            padding: 3px 8px; font-size: 10px; border-radius: 4px;
            border: 1px solid #3a3a5c; background: transparent; color: #63b3ed;
            cursor: pointer; flex: 1; text-align: center;
        }
        .yr-dd-action:hover { background: #1e1e3e; }
        .yr-dd-item {
            display: flex; align-items: center; gap: 8px; padding: 5px 10px;
            cursor: pointer; font-size: 12px; color: #c0c0d0; transition: background 0.1s;
        }
        .yr-dd-item:hover { background: #1e1e3e; }
        .yr-dd-check {
            width: 14px; height: 14px; border-radius: 3px; border: 1px solid #4a4a6c;
            background: transparent; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.15s;
        }
        .yr-dd-item.checked .yr-dd-check {
            background: #3b82f6; border-color: #3b82f6;
        }
        .yr-dd-item.checked .yr-dd-check::after {
            content: '\2713'; font-size: 10px; color: #fff;
        }
        /* ZHVI preset buttons */
        .zhvi-preset {
            padding: 4px 8px; font-size: 10px; border-radius: 4px;
            border: 1px solid #3a3a5c; background: #16162a; color: #c0d0f0;
            cursor: pointer; font-weight: 600; transition: all 0.15s;
            font-family: inherit;
        }
        .zhvi-preset:hover { background: #1e1e3e; border-color: #5a5a7c; }
        .zhvi-preset.active { background: #2b5dbc; border-color: #63b3ed; color: #fff; }
        /* Stats footer */
        .sb-stats {
            padding: 12px 16px; border-top: 1px solid #2a2a3e; margin-top: auto;
        }
        .sb-stats-title { font-size: 10px; font-weight: 700; color: #6a6a8a; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
        .sb-stats-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
        .sb-stats-label { color: #6a6a8a; }
        .sb-stats-value { color: #e0e0e0; font-weight: 600; font-variant-numeric: tabular-nums; }

        /* ===== MAIN AREA (right of sidebar) ===== */
        #main-area {
            margin-left: 250px; height: 100vh; display: flex; flex-direction: column; position: relative;
        }
        #map { flex: 1; width: 100%; }

        /* Basemap control floating on map top-right */
        #basemap-float {
            position: absolute; top: 10px; right: 10px; z-index: 800;
            display: flex; gap: 3px; background: rgba(30,30,46,0.85); padding: 4px;
            border-radius: 6px; border: 1px solid #2a2a3e; backdrop-filter: blur(6px);
        }
        .basemap-btn {
            padding: 5px 10px; font-size: 11px; border-radius: 4px;
            border: 1px solid #3a3a5c; background: transparent; color: #c0d0f0;
            cursor: pointer; transition: all 0.15s;
        }
        .basemap-btn.active { background: #2b5dbc; border-color: #63b3ed; color: #fff; }
        .basemap-btn:hover { background: #2a2a4e; }

        /* ===== BOTTOM DETAIL PANEL (50vh) ===== */
        #detail-panel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 900;
            background: #1a1a2e; color: #f5f7fa; border-top: 2px solid #3b82f6;
            height: 0; max-height: 55vh; overflow: hidden;
            transition: height 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
        }
        #detail-panel.open { height: 50vh; overflow: visible; }
        /* Overlay close button — always on top */
        #detail-panel-close {
            position: absolute; top: 10px; right: 14px; z-index: 920;
            background: rgba(26,26,46,0.7); border: 1px solid rgba(255,255,255,0.2); color: #e0e0e0;
            font-size: 20px; width: 34px; height: 34px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; backdrop-filter: blur(6px);
        }
        #detail-panel-close:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
        /* Normal detail mode header */
        #detail-panel-header {
            display: flex; align-items: center; padding: 12px 50px 0 16px; flex-shrink: 0;
        }
        #detail-panel-header h2 {
            margin: 0 0 4px 0; font-size: 17px; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;
        }
        /* Tabs */
        #detail-tabs {
            display: flex; gap: 0; padding: 8px 16px 0; flex-shrink: 0; border-bottom: 1px solid #2a3b5c;
        }
        .detail-tab {
            padding: 8px 18px; font-size: 12px; color: #8aa0cc; background: transparent;
            border: none; border-bottom: 2px solid transparent; cursor: pointer;
            transition: all 0.15s; font-weight: 600;
        }
        .detail-tab:hover { color: #c0d0f0; }
        .detail-tab.active { color: #fff; border-bottom-color: #3b82f6; }
        #detail-tab-content { flex: 1; overflow-y: auto; padding: 12px 16px 16px; min-height: 0; }
        .tab-pane { display: none; height: 100%; }
        .tab-pane.active { display: flex; flex-direction: column; }
        /* === STREET VIEW FULL-BLEED MODE === */
        #detail-panel.sv-mode #detail-panel-header,
        #detail-panel.sv-mode #detail-tabs { display: none; }
        #detail-panel.sv-mode #detail-tab-content { padding: 0; overflow: hidden; }
        #detail-panel.sv-mode .tab-pane.active { height: 100%; }
        #detail-panel.sv-mode .sv-iframe-wrap { height: 100%; min-height: unset; border-radius: 0; border: none; }
        /* SV overlay label */
        .sv-overlay-label {
            position: absolute; top: 10px; left: 14px; z-index: 915;
            background: rgba(26,26,46,0.7); backdrop-filter: blur(6px);
            padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
        }
        .sv-overlay-label h3 { margin: 0; font-size: 13px; color: #fff; font-weight: 600; }
        .sv-overlay-label .sv-coords { font-size: 10px; color: #a0a0c0; margin-top: 2px; }
        .sv-overlay-label a { color: #fbbf24; font-size: 10px; text-decoration: none; }
        .sv-overlay-label a:hover { text-decoration: underline; }
        /* Location tab full-bleed SV */
        .loc-tab-sv { display: flex; flex-direction: column; height: 100%; }
        .loc-tab-sv .loc-info { padding: 0 0 8px; flex-shrink: 0; }
        .loc-tab-sv .sv-iframe-wrap { flex: 1; min-height: 0; }

        /* ===== SHARED STYLES ===== */
        .badge { display: inline-block; padding: 4px 10px; margin-right: 6px; margin-bottom: 8px; font-size: 11px; border-radius: 999px; background: #193061; color: #e4ebff; }
        .badge.market { background: #1f6937; }
        .badge.lease { background: #92400e; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 8px; }
        .detail-label { color: #a8b3cc; font-size: 11px; }
        .detail-value { color: #fff; font-size: 13px; }
        .detail-full { grid-column: 1 / span 2; }
        .price { color: #53d47f; font-weight: bold; }
        .rent { color: #fbbf24; font-weight: bold; }
        .source { color: #9aa6c3; font-size: 11px; margin-top: 12px; }
        .tooltip-content { font-size:12px; line-height:1.3; }
        .parcel-crosshair, .sv-crosshair, .flag-crosshair { cursor: crosshair !important; }
        /* Flag for Review */
        .sb-toggle.on.flag { background: #ef4444; }
        #flagPanel { display: none; padding: 8px 0 0; }
        #flagPanel.active { display: block; }
        .flag-count { font-size: 12px; color: #fca5a5; font-weight: 600; margin-bottom: 6px; }
        .flag-btn {
            width: 100%; padding: 6px; font-size: 11px; border-radius: 6px;
            border: 1px solid #3a3a5c; background: #16162a; cursor: pointer;
            font-weight: 600; transition: all 0.15s; margin-bottom: 4px; text-align: center;
        }
        .flag-btn:hover { background: #1e1e3e; }
        .flag-btn.export { color: #4ade80; border-color: #22c55e40; }
        .flag-btn.clear { color: #f87171; border-color: #ef444440; }
        /* Street View iframe */
        .sv-iframe-wrap { width: 100%; height: 100%; min-height: 200px; border-radius: 6px; overflow: hidden; border: 1px solid #2a3b5c; }
        .sv-iframe-wrap iframe { width: 100%; height: 100%; border: 0; }
        /* Notes tab */
        .notes-section { margin-bottom: 14px; }
        .notes-section h4 { margin: 0 0 6px; font-size: 12px; color: #8aa0cc; text-transform: uppercase; letter-spacing: 0.5px; }
        .notes-section p { margin: 0; font-size: 13px; color: #e0e6f0; line-height: 1.5; white-space: pre-wrap; }
        #notification { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 6px; font-size: 12px; z-index: 10000; display: none; }
        #notification.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        #notification.error { background: #5f1e1e; color: #fca5a5; border: 1px solid #ef4444; }
        #notification.loading { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        /* Responsive */
        @media (max-width: 768px) {
            #sidebar { width: 200px; }
            #main-area { margin-left: 200px; }
            #detail-panel.open { height: 55vh; }
            .detail-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <!-- LEFT SIDEBAR -->
    <div id="sidebar">
        <div class="sb-header">
            <h1>COFE Properties</h1>
            <div class="sb-sub">Industrial Comp Database</div>
        </div>

        <!-- SEARCH -->
        <div class="sb-section">
            <div class="sb-section-title">Search</div>
            <div class="sb-search-wrap">
                <input id="searchBox" type="text" placeholder="Name, address, or any US address..." />
                <button id="searchGoBtn" title="Search or geocode address">Go</button>
            </div>
            <button class="sb-search-clear" id="searchClearBtn" title="Clear search">&times; Clear</button>
        </div>

        <!-- MARKET -->
        <div class="sb-section">
            <div class="sb-section-title">Market</div>
            <select id="marketFilter" class="sb-select">
                <option value="">All Markets</option>
                <option value="Atlanta">Atlanta</option><option value="Central Florida">Central Florida</option><option value="Charlotte">Charlotte</option><option value="Columbia, SC">Columbia, SC</option><option value="DFW">DFW</option><option value="Dallas-Fort Worth">Dallas-Fort Worth</option><option value="Houston">Houston</option><option value="Jacksonville">Jacksonville</option><option value="Miami">Miami</option><option value="Orlando">Orlando</option><option value="San Antonio">San Antonio</option><option value="South Florida">South Florida</option><option value="Tampa">Tampa</option><option value="Unknown">Unknown</option>
            </select>
        </div>

        <!-- COMP LAYERS -->
        <div class="sb-section">
            <div class="sb-section-title">Comp Layers</div>
            <div id="layerToggles"></div>
        </div>

        <!-- YEAR FILTER -->
        <div class="sb-section">
            <div class="sb-section-title">Year Filter</div>
            <div class="yr-dropdown-wrap" id="yearDropdownWrap">
                <button class="yr-dropdown-btn" id="yearDropdownBtn">All Years</button>
                <div class="yr-dropdown-menu" id="yearDropdownMenu">
                    <div class="yr-dd-actions">
                        <button class="yr-dd-action" id="yrAll">Select All</button>
                        <button class="yr-dd-action" id="yrNone">Clear All</button>
                    </div>
                    <div id="yearCheckboxes"></div>
                </div>
            </div>
        </div>

        <!-- NEIGHBORHOOD WEALTH (ZHVI) -->
        <div class="sb-section">
            <div class="sb-section-title">Neighborhood Wealth</div>
            <div style="font-size:10px;color:#6a6a8a;margin-bottom:8px;">
                Filter by Zillow median home value near each comp
            </div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
                <div style="flex:1;">
                    <div style="font-size:9px;color:#6a6a8a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Min</div>
                    <input type="number" id="zhviMin" class="sb-select" placeholder="Any" style="padding:6px 8px;font-size:11px;" step="50000" min="0">
                </div>
                <div style="flex:1;">
                    <div style="font-size:9px;color:#6a6a8a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Max</div>
                    <input type="number" id="zhviMax" class="sb-select" placeholder="Any" style="padding:6px 8px;font-size:11px;" step="50000" min="0">
                </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">
                <button class="zhvi-preset" data-min="0"      data-max="">Any</button>
                <button class="zhvi-preset" data-min="300000" data-max="">$300K+</button>
                <button class="zhvi-preset" data-min="500000" data-max="">$500K+</button>
                <button class="zhvi-preset" data-min="750000" data-max="">$750K+</button>
                <button class="zhvi-preset" data-min="1000000" data-max="">$1M+</button>
            </div>
            <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#a0a0c0;cursor:pointer;user-select:none;">
                <input type="checkbox" id="zhviIncludeNull" checked style="margin:0;cursor:pointer;">
                Include comps with no ZHVI data
            </label>
        </div>

        <!-- TOOLS -->
        <div class="sb-section">
            <div class="sb-section-title">Tools</div>
            <div class="sb-tool">
                <span class="sb-tool-label">Parcel Query</span>
                <div class="sb-toggle parcel" id="parcelBtn" title="Click map to query county GIS parcels"></div>
            </div>
            <div class="sb-tool">
                <span class="sb-tool-label">Street View</span>
                <div class="sb-toggle sv" id="streetViewBtn" title="Click map to open Street View"></div>
            </div>
            <div class="sb-tool">
                <span class="sb-tool-label">Flag for Review</span>
                <div class="sb-toggle flag" id="flagBtn" title="Click markers to flag them for review"></div>
            </div>
            <div id="flagPanel">
                <div class="flag-count"><span id="flagCount">0</span> comps flagged</div>
                <button class="flag-btn export" id="exportFlagged">&#x2913; Export Flagged CSV</button>
                <button class="flag-btn clear" id="clearFlags">&#x2715; Clear All Flags</button>
            </div>
        </div>

        <!-- COMP STATS -->
        <div class="sb-stats">
            <div class="sb-stats-title">Comp Stats</div>
            <div class="sb-stats-row">
                <span class="sb-stats-label">Total Pins</span>
                <span class="sb-stats-value" id="totalPins">0</span>
            </div>
            <div class="sb-stats-row">
                <span class="sb-stats-label">Visible</span>
                <span class="sb-stats-value" id="visibleCount">0</span>
            </div>
            <button id="refreshBtn" style="width:100%;margin-top:10px;padding:7px;font-size:11px;border-radius:6px;border:1px solid #3a3a5c;background:#16162a;color:#63b3ed;cursor:pointer;font-weight:600;transition:all 0.15s;" onmouseover="this.style.background='#1e1e3e'" onmouseout="this.style.background='#16162a'">&#x21BB; Refresh Data</button>
        </div>
    </div>

    <!-- MAIN MAP AREA -->
    <div id="main-area">
        <div id="notification"></div>
        <!-- Basemap toggle floating on map -->
        <div id="basemap-float">
            <button class="basemap-btn" data-base="street">Street</button>
            <button class="basemap-btn active" data-base="satellite">Satellite</button>
            <button class="basemap-btn" data-base="hybrid">Hybrid</button>
        </div>
        <div id="map"></div>
        <!-- Bottom Detail Panel -->
        <div id="detail-panel">
            <button id="detail-panel-close" title="Close panel">&times;</button>
            <div id="detail-panel-header">
                <div>
                    <h2 id="detail-panel-title">Click a marker to view details</h2>
                    <div id="detail-panel-badges"></div>
                </div>
            </div>
            <div id="detail-tabs">
                <button class="detail-tab active" data-tab="details">Details</button>
                <button class="detail-tab" data-tab="notes">Notes</button>
                <button class="detail-tab" data-tab="location">Location</button>
            </div>
            <div id="detail-tab-content">
                <div id="tab-details" class="tab-pane active"></div>
                <div id="tab-notes" class="tab-pane"></div>
                <div id="tab-location" class="tab-pane"></div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script>
        let ALL = [];
        var map, layers, activeLayers, markers, bounds, portfolioGroups, activeYears;

        const layerConfig = {
            ind_sale:    { name: 'Industrial Sale', color: '#3b82f6' },
            ind_lease:   { name: 'Industrial Lease', color: '#eab308' },
            ios_sale:    { name: 'IOS Sale', color: '#f97316' },

        async function geocodeSearch(query) {
            if (!query || query.length < 3) return;

            // First check if any comp markers match
            refreshMarkers();
            const q = query.toLowerCase();
            const matched = markers.filter(({comp}) => {
                const text = `${comp.n} ${comp.a} ${comp.m} ${comp.sm} ${comp.tenant||''} ${comp.landlord||''}`.toLowerCase();
                return text.includes(q);
            });

            if (matched.length > 0 && matched.length <= 50) {
                // Comps matched — zoom to fit them
                clearSearchMarker();
                const matchBounds = matched.map(({comp}) => [comp.lat, comp.lng]);
                if (matchBounds.length === 1) {
                    map.setView(matchBounds[0], 16);
                } else {
                    map.fitBounds(matchBounds, { padding: [40, 40], maxZoom: 16 });
                }
                return;
            }

            // No comp match (or too broad) — geocode as address
            clearSearchMarker();
            try {
                const resp = await fetch(`${GEOCODE_API}?address=${encodeURIComponent(query)}&key=${GEOCODE_KEY}`);
                const data = await resp.json();
                if (data.status === 'OK' && data.results.length > 0) {
                    const loc = data.results[0].geometry.location;
                    const addr = data.results[0].formatted_address;
                    map.flyTo([loc.lat, loc.lng], 17, { duration: 1.2 });
                    searchMarker = L.marker([loc.lat, loc.lng], {
                        icon: L.divIcon({
                            html: '<div style="background:#ef4444;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>',

                            iconSize: [14, 14],
                            iconAnchor: [7, 7]
                        })
                    }).addTo(map);
                    searchMarker.bindPopup(`<div style="font-size:13px;"><strong>Searched Location</strong><br>${addr}<br><span style="color:#888;font-size:11px;">${loc.lat.toFixed(6)}, ${loc.lng.toFixed(6)}</span></div>`).openPopup();
                    document.getElementById('searchClearBtn').style.display = 'inline-block';
                } else {
                    notify('Address not found', 'error', 3000);
                }
            } catch (e) {
                notify('Geocoding failed', 'error', 3000);
            }
        }

        document.getElementById('searchGoBtn').addEventListener('click', () => {
            geocodeSearch(document.getElementById('searchBox').value);
        });
        document.getElementById('searchBox').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                geocodeSearch(document.getElementById('searchBox').value);
            }
        });
        document.getElementById('searchClearBtn').addEventListener('click', () => {
            clearSearchMarker();
            document.getElementById('searchBox').value = '';
            refreshMarkers();
        });

        // ==========================================
        // PARCEL QUERY LAYER
        // ==========================================
        const counties = [
            {
                name: 'Harris County', state: 'TX',
                bounds: { latMin:29.0, latMax:30.5, lngMin:-96.2, lngMax:-94.5 },
                url: 'https://www.gis.hctx.net/arcgis/rest/services/HCAD/Parcels/MapServer/0/query',
                fieldMap: { owner:'owner_name_1', address:'site_str_num,site_str_name,site_str_sfx', parcelId:'HCAD_NUM',
                    marketValue:'total_market_val', landValue:'land_value', acreage:'Acreage', sqft:'land_sqft',
                    legal:'legal_dscr_1', ownerDate:'new_owner_date', landUse:'land_use' }
            },
            {
                name: 'Dallas County', state: 'TX',
                bounds: { latMin:32.5, latMax:33.1, lngMin:-97.1, lngMax:-96.4 },
                url: 'https://gis.dallascityhall.com/arcgis/rest/services/Basemap/DallasTaxParcels/FeatureServer/0/query',
                fieldMap: { owner:'TAXPANAME1', address:'ST_NUM,ST_DIR,ST_NAME,ST_TYPE', parcelId:'ACCT',
                    legal:'LEGAL_1', city:'CITY' }
            },
            {
                name: 'Tarrant County', state: 'TX',
                bounds: { latMin:32.4, latMax:33.0, lngMin:-97.7, lngMax:-97.0 },
                url: 'https://mapit.tarrantcounty.com/arcgis/rest/services/Tax/TCProperty/MapServer/0/query',
                fieldMap: { owner:'OWNER_NAME', address:'SITUS_ADDR', parcelId:'ACCOUNT',
                    totalValue:'TOTAL_VALU', landValue:'LAND_VALUE', imprValue:'IMPR_VALUE',
                    acreage:'LAND_ACRES', sqft:'LAND_SQFT', yearBuilt:'YEAR_BUILT',
                    deedDate:'DEED_DATE', legal:'LEGAL_1' }
            },
            {
                name: 'Fulton County', state: 'GA',
                bounds: { latMin:33.5, latMax:34.1, lngMin:-84.6, lngMax:-84.2 },
                url: 'https://gismaps.fultoncountyga.gov/arcgispub2/rest/services/PropertyMapViewer/ParcelQuery/MapServer/0/query',
                fieldMap: { owner:'Owner', address:'Address', parcelId:'ParcelID',
                    totalAppr:'TotAppr', landAppr:'LandAppr', imprAppr:'ImprAppr',
                    totalAssess:'TotAssess', acreage:'LandAcres', landUse:'LUCode',
                    subdivision:'Subdiv' }
            },
            {
                name: 'Miami-Dade County', state: 'FL',
                bounds: { latMin:25.0, latMax:26.0, lngMin:-80.9, lngMax:-80.0 },
                url: 'https://gisweb.miamidade.gov/arcgis/rest/services/MD_LandInformation/MapServer/26/query',
                fieldMap: { owner:'TRUE_OWNER1', address:'TRUE_SITE_ADDR', city:'TRUE_SITE_CITY',
                    parcelId:'FOLIO', zoning:'PRIMARY_ZONE', yearBuilt:'YEAR_BUILT',
                    totalValue:'TOTAL_VAL_CUR', landValue:'LAND_VAL_CUR', bldgValue:'BUILDING_VAL_CUR',
                    lotSize:'LOT_SIZE', bldgArea:'BUILDING_GROSS_AREA', subdivision:'SUBDIVISION' }
            },
            {
                name: 'Hillsborough County', state: 'FL',
                bounds: { latMin:27.5, latMax:28.2, lngMin:-82.8, lngMax:-82.1 },
                url: 'https://maps.hillsboroughcounty.org/arcgis/rest/services/InfoLayers/HC_Parcels/FeatureServer/0/query',
                fieldMap: { owner:'OWNER', address:'SITE_ADDR', city:'SITE_CITY', parcelId:'FOLIO',
                    marketValue:'MARKET_VAL', taxValue:'TAX_VAL', landValue:'LAND', bldgValue:'BLDG',
                    saleDate:'S_DATE', saleAmt:'S_AMT', acreage:'ACREAGE', dorCode:'DOR_CODE' }
            },
            {
                name: 'Orange County', state: 'FL',
                bounds: { latMin:28.0, latMax:29.0, lngMin:-82.0, lngMax:-81.0 },
                url: 'https://www.ocgis.com/arcpub/rest/services/Map_Layers/Parcels/MapServer/0/query',
                fieldMap: { address:'SITE_ADDRESS', parcelId:'ASSESSMENT_NO', yearBuilt:'YEAR_BUILT' }
            }
        ];

        let parcelMode = false;
        let parcelLayer = null;

        function notify(msg, type, duration) {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.className = type || 'info';
            el.style.display = 'block';
            if (duration) setTimeout(() => el.style.display = 'none', duration);
        }

        function identifyCounty(lat, lng) {
            for (const c of counties) {
                const b = c.bounds;
                if (lat >= b.latMin && lat <= b.latMax && lng >= b.lngMin && lng <= b.lngMax) return c;
            }
            return null;
        }

        function fmtDollar(v) {
            if (v == null || v === '' || v === 0) return null;
            const n = Number(v);
            if (isNaN(n)) return String(v);
            return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function fmtDate(v) {
            if (!v) return null;
            if (typeof v === 'number') {
                const d = new Date(v);
                if (!isNaN(d)) return d.toLocaleDateString('en-US');
            }
            return String(v);
        }

        function buildAddress(attrs, fm) {
            if (fm.address && fm.address.includes(',')) {
                // Composite address from multiple fields
                const parts = fm.address.split(',').map(f => attrs[f.trim()]).filter(Boolean);
                return parts.join(' ');
            }
            return attrs[fm.address] || null;
        }

        function drawParcel(geometry) {
            if (parcelLayer) map.removeLayer(parcelLayer);
            if (!geometry || !geometry.rings) return;
            // Convert Esri rings to Leaflet LatLng arrays
            const polys = geometry.rings.map(ring => ring.map(pt => [pt[1], pt[0]]));
            parcelLayer = L.polygon(polys, {
                color: '#00ffff', weight: 3, fillColor: '#00ffff', fillOpacity: 0.12,
                dashArray: '6,4'
            }).addTo(map);
        }

        function showParcelDetail(attrs, county) {
            const fm = county.fieldMap;
            const addr = buildAddress(attrs, fm);
            const owner = attrs[fm.owner] || null;
            const pid = attrs[fm.parcelId] || null;
            const zoning = attrs[fm.zoning] || null;
            const yearBuilt = attrs[fm.yearBuilt] || null;
            const subdivision = attrs[fm.subdivision] || null;
            const legal = attrs[fm.legal] || null;

            // Values
            const mv = fmtDollar(attrs[fm.marketValue] || attrs[fm.totalAppr] || attrs[fm.totalValue]);
            const lv = fmtDollar(attrs[fm.landValue] || attrs[fm.landAppr]);
            const bv = fmtDollar(attrs[fm.bldgValue] || attrs[fm.imprValue] || attrs[fm.imprAppr]);
            const tv = fmtDollar(attrs[fm.taxValue] || attrs[fm.totalAssess]);
            const sa = fmtDollar(attrs[fm.saleAmt]);
            const sd = fmtDate(attrs[fm.saleDate] || attrs[fm.ownerDate] || attrs[fm.deedDate]);
            const ac = attrs[fm.acreage] ? Number(attrs[fm.acreage]).toFixed(2) + ' AC' : null;
            const sqft = attrs[fm.sqft] ? Number(attrs[fm.sqft]).toLocaleString() + ' SF' : null;
            const lot = attrs[fm.lotSize] ? Number(attrs[fm.lotSize]).toLocaleString() + ' SF' : null;
            const bldgArea = attrs[fm.bldgArea] ? Number(attrs[fm.bldgArea]).toLocaleString() + ' SF' : null;
            const city = attrs[fm.city] || null;

            const rows = [
                ['Owner', owner],
                ['Address', [addr, city, county.state].filter(Boolean).join(', ')],
                ['Parcel ID', pid],
                ['Market/Appraised Value', mv],
                ['Land Value', lv],
                ['Building Value', bv],
                ['Tax/Assessed Value', tv],
                ['Last Sale Price', sa],
                ['Last Sale/Deed Date', sd],
                ['Land Area', ac || sqft || lot],
                ['Building Area', bldgArea],
                ['Year Built', yearBuilt],
                ['Zoning', zoning],
                ['Subdivision', subdivision],
                ['Legal Description', legal],
            ].filter(([, v]) => v != null && v !== '' && v !== 'null');

            // Exit SV mode, clean up overlay
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('sv-mode');
            const oldSvLabel = panel.querySelector('.sv-overlay-label');
            if (oldSvLabel) oldSvLabel.remove();

            // Populate panel header
            document.getElementById('detail-panel-title').textContent = 'Parcel Query Result';
            document.getElementById('detail-panel-badges').innerHTML = `<span class="badge" style="background:#00e5ff30;color:#00e5ff;border:1px solid #00e5ff80">${county.name}</span>`;

            // Details tab
            document.getElementById('tab-details').innerHTML = `
                <div class="detail-grid" style="margin-top:4px;">
                    ${rows.map(([label, val]) => {
                        const isPrice = /value|price|sale/i.test(label);
                        return `<div class="detail-full"><div class="detail-label">${label}</div><div class="detail-value${isPrice?' price':''}">${val}</div></div>`;
                    }).join('')}
                </div>
                <div class="source" style="margin-top:12px;">Source: ${county.name} GIS &bull; Data may not reflect recent transactions</div>
            `;
            document.getElementById('tab-notes').innerHTML = '<p style="color:#8aa0cc;">No notes for parcel queries.</p>';
            document.getElementById('tab-location').innerHTML = '<p style="color:#8aa0cc;">Location data shown above.</p>';
            if (!panel.classList.contains('open')) {
                panel.classList.add('open');
                setTimeout(() => map.invalidateSize({ animate: true }), 350);
            }
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelector('.detail-tab[data-tab="details"]').classList.add('active');
            document.getElementById('tab-details').classList.add('active');
        }

        async function queryParcel(latlng) {
            const county = identifyCounty(latlng.lat, latlng.lng);
            if (!county) {
                notify('No parcel data available for this location', 'error', 3000);
                return;
            }
            notify('Querying ' + county.name + ' parcels...', 'loading');

            const params = new URLSearchParams({
                geometry: `${latlng.lng},${latlng.lat}`,
                geometryType: 'esriGeometryPoint',
                spatialRel: 'esriSpatialRelIntersects',
                outFields: '*',
                returnGeometry: 'true',
                f: 'json',
                inSR: '4326',
                outSR: '4326'
            });

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const resp = await fetch(county.url + '?' + params, { signal: controller.signal });
                clearTimeout(timeout);
                const data = await resp.json();

                if (data.error) {
                    notify(`${county.name}: ${data.error.message || 'Query error'}`, 'error', 4000);
                    return;
                }
                if (!data.features || data.features.length === 0) {
                    notify('No parcel found at this location in ' + county.name, 'error', 3000);
                    return;
                }

                const feature = data.features[0];
                drawParcel(feature.geometry);
                showParcelDetail(feature.attributes, county);
                document.getElementById('notification').style.display = 'none';
            } catch (e) {
                if (e.name === 'AbortError') {
                    notify(`${county.name} query timed out. Try again later.`, 'error', 4000);
                } else {
                    // Likely CORS — some county endpoints may block cross-origin requests
                    notify(`${county.name} parcel data unavailable (may be CORS-blocked). Try again later.`, 'error', 4000);
                }
            }
        }

        // ==========================================
        // STREET VIEW MODE
        // ==========================================
        let streetViewMode = false;
        const streetViewBtn = document.getElementById('streetViewBtn');

        streetViewBtn.addEventListener('click', () => {
            streetViewMode = !streetViewMode;
            streetViewBtn.classList.toggle('on', streetViewMode);
            document.getElementById('map').classList.toggle('sv-crosshair', streetViewMode);
            if (streetViewMode && parcelMode) {
                parcelMode = false;
                parcelBtn.classList.remove('on');
                document.getElementById('map').classList.remove('parcel-crosshair');
            }
        });

        function openStreetViewPanel(lat, lng) {
            const svUrl = `https://www.google.com/maps/embed/v1/streetview?key=${GEOCODE_KEY}&location=${lat},${lng}&heading=0&pitch=0&fov=90`;
            const panel = document.getElementById('detail-panel');

            // Enable full-bleed SV mode
            panel.classList.add('sv-mode');

            // Remove any previous overlay label
            const oldLabel = panel.querySelector('.sv-overlay-label');
            if (oldLabel) oldLabel.remove();

            // Full-bleed iframe in the location tab
            document.getElementById('tab-details').innerHTML = '';
            document.getElementById('tab-notes').innerHTML = '';
            document.getElementById('tab-location').innerHTML = `
                <div class="sv-iframe-wrap">
                    <iframe src="${svUrl}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            `;

            // Add overlay label with coords and link
            const label = document.createElement('div');
            label.className = 'sv-overlay-label';
            label.innerHTML = `
                <h3>Street View</h3>
                <div class="sv-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
                <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}" target="_blank" rel="noopener">Open in Google Maps &rarr;</a>
            `;
            panel.appendChild(label);

            // Open panel and show location tab (full-bleed)
            if (!panel.classList.contains('open')) {
                panel.classList.add('open');
                setTimeout(() => map.invalidateSize({ animate: true }), 350);
            }
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelector('.detail-tab[data-tab="location"]').classList.add('active');
            document.getElementById('tab-location').classList.add('active');
        }

        // Toggle parcel button
        const parcelBtn = document.getElementById('parcelBtn');
        parcelBtn.addEventListener('click', () => {
            parcelMode = !parcelMode;
            parcelBtn.classList.toggle('on', parcelMode);
            document.getElementById('map').classList.toggle('parcel-crosshair', parcelMode);
            if (!parcelMode && parcelLayer) {
                map.removeLayer(parcelLayer);
                parcelLayer = null;
            }
            if (parcelMode && streetViewMode) {
                streetViewMode = false;
                streetViewBtn.classList.remove('on');
                document.getElementById('map').classList.remove('sv-crosshair');
            }
        });

        // Map click handler — street view or parcel mode
        map.on('click', (e) => {
            if (streetViewMode) {
                openStreetViewPanel(e.latlng.lat, e.latlng.lng);
            } else if (parcelMode) {
                queryParcel(e.latlng);
            }
        });

        // ==========================================
        // FLAG FOR REVIEW MODE
        // ==========================================
        let flagMode = false;
        const flaggedSet = new Map(); // marker -> { comp, origColor }
        const flagBtn = document.getElementById('flagBtn');
        const flagPanel = document.getElementById('flagPanel');

        flagBtn.addEventListener('click', () => {
            flagMode = !flagMode;
            flagBtn.classList.toggle('on', flagMode);
            document.getElementById('map').classList.toggle('flag-crosshair', flagMode);
            flagPanel.classList.toggle('active', flagMode || flaggedSet.size > 0);
            // Deactivate other modes
            if (flagMode) {
                if (parcelMode) { parcelMode = false; parcelBtn.classList.remove('on'); document.getElementById('map').classList.remove('parcel-crosshair'); }
                if (streetViewMode) { streetViewMode = false; streetViewBtn.classList.remove('on'); document.getElementById('map').classList.remove('sv-crosshair'); }
            }
        });

        function toggleFlag(marker, comp, origColor) {
            if (flaggedSet.has(marker)) {
                // Un-flag
                const info = flaggedSet.get(marker);
                marker.setStyle({ color: info.origColor, fillColor: info.origColor, radius: 7, weight: 1 });
                flaggedSet.delete(marker);
            } else {
                // Flag it — red ring
                flaggedSet.set(marker, { comp, origColor });
                marker.setStyle({ color: '#ef4444', fillColor: '#ef4444', radius: 9, weight: 3 });
            }
            updateFlagUI();
        }

        function updateFlagUI() {
            document.getElementById('flagCount').textContent = flaggedSet.size;
            flagPanel.classList.toggle('active', flagMode || flaggedSet.size > 0);
        }

        // Export flagged comps as CSV
        document.getElementById('exportFlagged').addEventListener('click', () => {
            if (flaggedSet.size === 0) { notify('No comps flagged', 'error', 2000); return; }
            const header = ['Row','Layer Type','Property Name','Address','Market','Submarket','Sale Date','Lat','Lng'];
            const rows = [];
            flaggedSet.forEach(({ comp }) => {
                const layerName = (layerConfig[comp.l] || {}).name || comp.l;
                rows.push([
                    comp.row || '',
                    layerName,
                    '"' + (comp.n || '').replace(/"/g, '""') + '"',
                    '"' + (comp.a || '').replace(/"/g, '""') + '"',
                    comp.m || '',
                    comp.sm || '',
                    comp.dt || '',
                    comp.lat || '',
                    comp.lng || ''
                ].join(','));
            });
            const csv = header.join(',') + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'flagged_for_review.csv'; a.click();
            URL.revokeObjectURL(url);
            notify('Exported ' + flaggedSet.size + ' flagged comps', 'info', 2500);
        });

        // Clear all flags
        document.getElementById('clearFlags').addEventListener('click', () => {
            flaggedSet.forEach(({ origColor }, marker) => {
                marker.setStyle({ color: origColor, fillColor: origColor, radius: 7, weight: 1 });
            });
            flaggedSet.clear();
            updateFlagUI();
            notify('All flags cleared', 'info', 2000);
        });

        // ==========================================
        // DATA LOADING (inside initMap for scope access)
        // ==========================================
        function refreshData() {
            notify('Refreshing data...', 'loading');
            fetch('data.json?t=' + Date.now())
                .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function(data) {
                    ALL = data;
                    // Clear existing markers and flags
                    flaggedSet.clear();
                    updateFlagUI();
                    Object.values(layers).forEach(function(lg) { lg.clearLayers(); });
                    markers.length = 0;
                    bounds.length = 0;
                    Object.keys(portfolioGroups).forEach(function(k) { delete portfolioGroups[k]; });
                    // Rebuild markers
                    ALL.forEach(function(comp) {
                        if (!comp.lat || !comp.lng) return;
                        var color = (layerConfig[comp.l] || {}).color || '#999';
                        var marker = L.circleMarker([comp.lat, comp.lng], { color: color, fillColor: color, fillOpacity: 0.85, radius: 7, weight: 1 });
                        marker.bindTooltip(getTooltipHTML(comp), { direction: 'top', offset: [0, -8], opacity: 0.95 });
                        marker.on('click', function() {
                            if (flagMode) { toggleFlag(marker, comp, color); return; }
                            setDetailPanel(comp);
                            if (comp.pg && portfolioGroups[comp.pg]) {
                                portfolioGroups[comp.pg].forEach(function(m2) {
                                    if (m2 !== marker) {
                                        m2.setStyle({ radius: 10, color: '#ffff00', fillColor: '#ffff00' });
                                        setTimeout(function() { m2.setStyle({ radius: 7, color: color, fillColor: color }); }, 1200);
                                    }
                                });
                            }
                        });
                        if (comp.pg) {
                            portfolioGroups[comp.pg] = portfolioGroups[comp.pg] || [];
                            portfolioGroups[comp.pg].push(marker);
                        }
                        layers[comp.l].addLayer(marker);
                        markers.push({ marker: marker, comp: comp });
                        bounds.push([comp.lat, comp.lng]);
                    });
                    // Re-add active layers to map
                    Object.entries(layers).forEach(function(e) {
                        if (activeLayers.has(e[0])) map.addLayer(e[1]);
                    });
                    // Update layer counts in sidebar
                    var lc = {};
                    ALL.forEach(function(c) { lc[c.l] = (lc[c.l]||0) + 1; });
                    document.querySelectorAll('.sb-layer').forEach(function(el) {
                        var k = el.dataset.layer;
                        if (el.querySelector('.sb-layer-count')) el.querySelector('.sb-layer-count').textContent = (lc[k]||0).toLocaleString();
                    });
                    // Rebuild year checkboxes
                    var newYears = [...new Set(ALL.map(function(c){return c.yr;}).filter(function(y){return y;}))].sort(function(a,b){return b-a;});
                    activeYears = new Set(newYears);
                    var yc = document.getElementById('yearCheckboxes');
                    yc.innerHTML = '';
                    newYears.forEach(function(y) {
                        var item = document.createElement('div');
                        item.className = 'yr-dd-item checked';
                        item.dataset.year = y;
                        item.innerHTML = '<span class="yr-dd-check"></span><span>'+y+'</span>';
                        item.addEventListener('click', function() {
                            if (activeYears.has(y)) { activeYears.delete(y); item.classList.remove('checked'); }
                            else { activeYears.add(y); item.classList.add('checked'); }
                            updateYearBtnLabel();
                            refreshMarkers();
                        });
                        yc.appendChild(item);
                    });
                    updateYearBtnLabel();
                    document.getElementById('totalPins').textContent = ALL.length.toLocaleString();
                    refreshMarkers();
                    notify('Refreshed: ' + ALL.length.toLocaleString() + ' comps loaded', 'info', 2500);
                })
                .catch(function(e) { notify('Refresh failed: ' + e.message, 'error', 5000); });
        }
        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        } // end initMap

        // Initial data load
        fetch('data.json')
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) {
                ALL = data;
                initMap();
            })
            .catch(function(e) {
                document.getElementById('map').innerHTML = '<div style="padding:40px;color:#ef4444;text-align:center;"><h2>Failed to load data</h2><p>' + e.message + '</p><p>Make sure data.json exists in the same directory.</p></div>';
            });


    </script>
