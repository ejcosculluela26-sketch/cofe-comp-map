    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background:#0b1220; color:white; }
        #header { background: #091127; padding: 8px 16px; border-bottom: 1px solid #23325c; display:flex; justify-content:space-between; align-items:center; }
        #header h1 { margin: 0; font-size: 16px; }
        #header .count { font-size: 12px; color: #8aa0cc; }
        #container { display: flex; width: 100vw; height: calc(100vh - 85px); }
        #map { flex: 1; height: 100%; }
        #detail-panel { width: 360px; background: #0f1b34; color: #f5f7fa; border-left: 1px solid #2a3b5c; overflow-y: auto; padding: 16px; }
        #detail-panel h2 { margin-top: 0; margin-bottom: 8px; font-size: 17px; line-height:1.3; }
        .badge { display: inline-block; padding: 4px 10px; margin-right: 6px; margin-bottom: 8px; font-size: 11px; border-radius: 999px; background: #193061; color: #e4ebff; }
        .badge.market { background: #1f6937; }
        .badge.lease { background: #92400e; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 8px; }
        .detail-label { color: #a8b3cc; font-size: 11px; }
        .detail-value { color: #fff; font-size: 13px; }
        .detail-full { grid-column: 1 / span 2; }
        .price { color: #53d47f; font-weight: bold; }
        .rent { color: #fbbf24; font-weight: bold; }
        .source { color: #9aa6c3; font-size: 11px; margin-top: 12px; }
        .tooltip-content { font-size:12px; line-height:1.3; }
        #controls { padding: 8px 12px; background: #091127; border-bottom:1px solid #213456; display:flex; gap: 8px; align-items:center; flex-wrap:wrap; }
        #controls select, #controls input { padding: 6px 8px; font-size: 12px; border-radius: 4px; border:1px solid #6585b5; background:#132547; color:white; }
        #controls input { width: 200px; }
        .layer-toggle { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; font-size:11px; border-radius:999px; cursor:pointer; user-select:none; transition:all 0.15s; border:1px solid; }
        .layer-toggle.active { opacity:1; }
        .layer-toggle:not(.active) { opacity:0.35; }
        .layer-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
        #year-bar { padding: 6px 10px; background: #091127; border-bottom:1px solid #213456; display:flex; gap: 5px; align-items:center; flex-wrap: wrap; }
        #year-bar .label { font-size: 12px; color: #a8b3cc; margin-right: 4px; }
        .yr-pill { padding: 4px 10px; font-size: 11px; border-radius: 999px; border: 1px solid #3b5998; background: #193061; color: #e4ebff; cursor: pointer; user-select: none; transition: all 0.15s; }
        .yr-pill.active { background: #2b6cb0; border-color: #63b3ed; color: #fff; }
        .yr-pill:not(.active) { background: #0d1a2e; border-color: #2a3b5c; color: #5a6a8a; }
        .yr-btn { padding: 4px 8px; font-size: 10px; border-radius: 4px; border: 1px solid #3b5998; background: transparent; color: #63b3ed; cursor: pointer; margin-left: 2px; }
        .yr-btn:hover { background: #193061; }
        .basemap-btn { padding: 4px 8px; font-size: 11px; border-radius: 4px; border: 1px solid #3b5998; background: transparent; color: #c0d0f0; cursor: pointer; }
        .basemap-btn.active { background: #2b5dbc; border-color: #63b3ed; color: #fff; }
        #parcelBtn { padding: 5px 12px; font-size: 11px; border-radius: 999px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; font-weight: bold; transition: all 0.15s; margin-left: 8px; }
        #parcelBtn.active { background: #00e5ff; color: #091127; }
        #parcelBtn:hover { background: #00e5ff33; }
        .parcel-crosshair { cursor: crosshair !important; }
        #notification { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 6px; font-size: 12px; z-index: 10000; display: none; }
        #notification.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        #notification.error { background: #5f1e1e; color: #fca5a5; border: 1px solid #ef4444; }
        #notification.loading { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
    </style>
</head>

        const layerConfig = {
            ind_sale:    { name: 'Industrial Sale', color: '#3b82f6' },
            ind_lease:   { name: 'Industrial Lease', color: '#eab308' },
            ios_sale:    { name: 'IOS Sale', color: '#f97316' },
            ios_rent:    { name: 'IOS Rent', color: '#22c55e' },
            ios_pipeline:{ name: 'IOS Pipeline', color: '#a855f7' }
        };

        // Count per layer
        const layerCounts = {};
        ALL.forEach(c => { layerCounts[c.l] = (layerCounts[c.l]||0) + 1; });

        // Basemaps
        const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB', subdomains: 'abcd', maxZoom: 20
        });
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri', maxZoom: 19
        });
        const hybridLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd', maxZoom: 20, pane: 'overlayPane'
        });
        const hybridGroup = L.layerGroup([satellite, hybridLabels]);

        const basemaps = { street, satellite, hybrid: hybridGroup };
        let activeBase = 'satellite';

        const map = L.map('map', { layers: [satellite] }).setView([29.7, -95.4], 6);

        document.querySelectorAll('.basemap-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.basemap-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const newBase = btn.dataset.base;
                map.removeLayer(basemaps[activeBase]);
                map.addLayer(basemaps[newBase]);
                activeBase = newBase;
            });
        });

        // Create cluster groups per layer
        const layers = {};
        const activeLayers = new Set(Object.keys(layerConfig));
        const portfolioGroups = {};
        const markers = [];

        Object.keys(layerConfig).forEach(k => {
            layers[k] = L.markerClusterGroup({
                maxClusterRadius: 40,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                iconCreateFunction: function(cluster) {
                    const count = cluster.getChildCount();
                    const color = layerConfig[k].color;
                    return L.divIcon({
                        html: `<div style="background:${color};color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid rgba(255,255,255,0.4);">${count}</div>`,
                        className: '',
                        iconSize: [30, 30]
                    });
                }
            });
        });

        // Layer toggles
        const toggleContainer = document.getElementById('layerToggles');
        Object.entries(layerConfig).forEach(([k, v]) => {
            const el = document.createElement('span');
            el.className = 'layer-toggle active';
            el.style.borderColor = v.color;
            el.innerHTML = `<span class="layer-dot" style="background:${v.color}"></span>${v.name} (${layerCounts[k]||0})`;
            el.dataset.layer = k;
            el.addEventListener('click', () => {
                if (activeLayers.has(k)) {
                    activeLayers.delete(k);
                    el.classList.remove('active');
                    map.removeLayer(layers[k]);
                } else {
                    activeLayers.add(k);
                    el.classList.add('active');
                    map.addLayer(layers[k]);
                }
                refreshMarkers();
            });
            toggleContainer.appendChild(el);
        });

        function setDetailPanel(comp) {
            const lc = layerConfig[comp.l] || {};
            const layerBadge = `<span class="badge" style="background:${lc.color}40;color:${lc.color};border:1px solid ${lc.color}80">${lc.name}</span>`;
            const marketBadge = comp.m ? `<span class="badge market">${comp.m}${comp.sm ? ' / '+comp.sm : ''}</span>` : '';

            let rows = '';

            if (comp.l === 'ind_lease') {
                rows = `
                    <div class="detail-label">Base Rent</div><div class="detail-label">Rent Type</div>
                    <div class="detail-value rent">${comp.base_rent || 'N/A'}</div><div class="detail-value">${comp.rent_type || 'N/A'}</div>
                    <div class="detail-label">Size</div><div class="detail-label">Lease Date</div>
                    <div class="detail-value">${comp.sf || 'N/A'}</div><div class="detail-value">${comp.dt || 'N/A'}</div>
                    <div class="detail-label">Lease Term</div><div class="detail-label">Lease Type</div>
                    <div class="detail-value">${comp.lease_term || 'N/A'}</div><div class="detail-value">${comp.lease_type || 'N/A'}</div>
                    <div class="detail-label">TI Allowance</div><div class="detail-label">Free Rent</div>
                    <div class="detail-value">${comp.ti_allowance || 'N/A'}</div><div class="detail-value">${comp.free_rent || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Tenant</div><div class="detail-value">${comp.tenant || 'N/A'}</div></div>
                    <div class="detail-full"><div class="detail-label">Landlord</div><div class="detail-value">${comp.landlord || 'N/A'}</div></div>
                    <div class="detail-label">Clear HT</div><div class="detail-label">Year Built</div>
                    <div class="detail-value">${comp.clear_height || 'N/A'}</div><div class="detail-value">${comp.year_built || 'N/A'}</div>
                `;
            } else if (comp.l === 'ios_sale') {
                rows = `
                    <div class="detail-label">Sale Price</div><div class="detail-label">Price/Usable AC</div>
                    <div class="detail-value price">${comp.p || 'N/A'}</div><div class="detail-value">${comp.price_usable_ac || 'N/A'}</div>
                    <div class="detail-label">Price/Total AC</div><div class="detail-label">Price/SF</div>
                    <div class="detail-value">${comp.price_total_ac || 'N/A'}</div><div class="detail-value">${comp.psf || 'N/A'}</div>
                    <div class="detail-label">Total Acres</div><div class="detail-label">Usable Acres</div>
                    <div class="detail-value">${comp.total_ac || 'N/A'}</div><div class="detail-value">${comp.usable_ac || 'N/A'}</div>
                    <div class="detail-label">Building SF</div><div class="detail-label">Date</div>
                    <div class="detail-value">${comp.sf || 'N/A'}</div><div class="detail-value">${comp.dt || 'N/A'}</div>
                    <div class="detail-label">Zoning</div><div class="detail-label">Tenant</div>
                    <div class="detail-value">${comp.zoning || 'N/A'}</div><div class="detail-value">${comp.tenant || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Address</div><div class="detail-value">${comp.a || 'N/A'}</div></div>
                    ${comp.notes ? `<div class="detail-full"><div class="detail-label">Notes</div><div class="detail-value">${comp.notes}</div></div>` : ''}
                `;
            } else if (comp.l === 'ios_rent') {
                rows = `
                    <div class="detail-label">Rent/AC/Mo</div><div class="detail-label">Rent/SF/Yr</div>
                    <div class="detail-value rent">${comp.rent_ac || 'N/A'}</div><div class="detail-value">${comp.rent_sf || 'N/A'}</div>
                    <div class="detail-label">Land (AC)</div><div class="detail-label">Building SF</div>
                    <div class="detail-value">${comp.land_ac || 'N/A'}</div><div class="detail-value">${comp.sf || 'N/A'}</div>
                    <div class="detail-label">Type</div><div class="detail-label">Date</div>
                    <div class="detail-value">${comp.ios_type || 'N/A'}</div><div class="detail-value">${comp.dt || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Tenant Type</div><div class="detail-value">${comp.tenant_type || 'N/A'}</div></div>
                    <div class="detail-full"><div class="detail-label">Address</div><div class="detail-value">${comp.a || 'N/A'}</div></div>
                    ${comp.notes ? `<div class="detail-full"><div class="detail-label">Notes</div><div class="detail-value">${comp.notes}</div></div>` : ''}
                `;
            } else if (comp.l === 'ios_pipeline') {
                rows = `
                    <div class="detail-label">Asking Price</div><div class="detail-label">Target Price</div>
                    <div class="detail-value price">${comp.p || 'N/A'}</div><div class="detail-value">${comp.target || 'N/A'}</div>
                    <div class="detail-label">Price/Usable AC</div><div class="detail-label">Price/Total AC</div>
                    <div class="detail-value">${comp.price_usable_ac || 'N/A'}</div><div class="detail-value">${comp.price_total_ac || 'N/A'}</div>
                    <div class="detail-label">Total Acres</div><div class="detail-label">Usable Acres</div>
                    <div class="detail-value">${comp.total_ac || 'N/A'}</div><div class="detail-value">${comp.usable_ac || 'N/A'}</div>
                    <div class="detail-label">Building SF</div><div class="detail-label">Status</div>
                    <div class="detail-value">${comp.sf || 'N/A'}</div><div class="detail-value">${comp.status || 'N/A'}</div>
                    <div class="detail-label">Zoning</div><div class="detail-label">Year Built</div>
                    <div class="detail-value">${comp.zoning || 'N/A'}</div><div class="detail-value">${comp.year_built || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Address</div><div class="detail-value">${comp.a || 'N/A'}</div></div>
                `;
            } else {
                // Industrial Sale layout
                rows = `
                    <div class="detail-label">Sale Price</div><div class="detail-label">PSF</div>
                    <div class="detail-value price">${comp.p || 'N/A'}</div><div class="detail-value">${comp.psf || 'N/A'}</div>
                    <div class="detail-label">Size</div><div class="detail-label">Date</div>
                    <div class="detail-value">${comp.sf || 'N/A'}</div><div class="detail-value">${comp.dt || 'N/A'}</div>
                    <div class="detail-label">Cap Rate</div><div class="detail-label">Occupancy</div>
                    <div class="detail-value">${comp.cap || 'N/A'}</div><div class="detail-value">${comp.occupancy || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Seller</div><div class="detail-value">${comp.seller || 'N/A'}</div></div>
                    <div class="detail-full"><div class="detail-label">Buyer</div><div class="detail-value">${comp.buyer || 'N/A'}</div></div>
                    <div class="detail-label">Clear HT</div><div class="detail-label">Class</div>
                    <div class="detail-value">${comp.clear_height || 'N/A'}</div><div class="detail-value">${comp.cls || 'N/A'}</div>
                    <div class="detail-full"><div class="detail-label">Address</div><div class="detail-value">${comp.a || 'N/A'}</div></div>
                `;
            }

            const html = `
                <h2>${comp.n || 'Unnamed Property'}</h2>
                ${layerBadge}${marketBadge}
                <div class="detail-grid">${rows}</div>
                <div class="source">Source: ${comp.source || 'N/A'}</div>
                ${comp.pg ? `<div style="margin-top:10px;color:#a0c0ff;">Portfolio: ${comp.pn}<br>Sibling addresses:<ul style='margin:6px 0 0 16px;padding:0;list-style:disc;'>${(comp.ps||[]).map(a=>`<li style='margin-bottom:2px;'>${a}</li>`).join('')}</ul></div>` : ''}
            `;
            document.getElementById('detail-content').innerHTML = html;
        }

        function getTooltipHTML(comp) {
            const lc = layerConfig[comp.l] || {};
            let priceInfo = '';
            if (comp.l === 'ind_lease') priceInfo = comp.base_rent || '';
            else if (comp.l === 'ios_rent') priceInfo = comp.rent_ac || '';
            else priceInfo = comp.p || '';
            return `<div class="tooltip-content"><strong>${comp.n || 'Property'}</strong><br>${priceInfo}<br>${lc.name} &bull; ${comp.m || ''}<br>${comp.dt || ''}<br><em>View details &rarr;</em></div>`;
        }

        const bounds = [];

        ALL.forEach(comp => {
            if (!comp.lat || !comp.lng) return;
            const color = layerConfig[comp.l]?.color || '#999';
            const marker = L.circleMarker([comp.lat, comp.lng], { color, fillColor: color, fillOpacity: 0.85, radius: 7, weight: 1 });
            marker.bindTooltip(getTooltipHTML(comp), { direction: 'top', offset: [0, -8], opacity: 0.95 });
            marker.on('click', () => {
                setDetailPanel(comp);
                if (comp.pg && portfolioGroups[comp.pg]) {
                    portfolioGroups[comp.pg].forEach(m2 => {
                        if (m2 !== marker) {
                            m2.setStyle({ radius: 10, color: '#ffff00', fillColor: '#ffff00' });
                            setTimeout(() => m2.setStyle({ radius: 7, color, fillColor: color }), 1200);
                        }
                    });
                }
            });

            if (comp.pg) {
                portfolioGroups[comp.pg] = portfolioGroups[comp.pg] || [];
                portfolioGroups[comp.pg].push(marker);
            }

            layers[comp.l].addLayer(marker);
            markers.push({ marker, comp });
            bounds.push([comp.lat, comp.lng]);
        });

        Object.entries(layers).forEach(([k, layer]) => {
            if (activeLayers.has(k)) map.addLayer(layer);
        });

        if (bounds.length) {
            map.fitBounds(bounds, { padding: [20, 20] });
        }

        // Year pills
        const years = [...new Set(ALL.map(c => c.yr).filter(y => y))].sort((a, b) => b - a);
        const activeYears = new Set(years);
        const pillContainer = document.getElementById('yearPills');

        years.forEach(y => {
            const pill = document.createElement('span');
            pill.className = 'yr-pill active';
            pill.textContent = y;
            pill.dataset.year = y;
            pill.addEventListener('click', () => {
                if (activeYears.has(y)) { activeYears.delete(y); pill.classList.remove('active'); }
                else { activeYears.add(y); pill.classList.add('active'); }
                refreshMarkers();
            });
            pillContainer.appendChild(pill);
        });

        document.getElementById('yrAll').addEventListener('click', () => {
            years.forEach(y => activeYears.add(y));
            pillContainer.querySelectorAll('.yr-pill').forEach(p => p.classList.add('active'));
            refreshMarkers();
        });
        document.getElementById('yrNone').addEventListener('click', () => {
            activeYears.clear();
            pillContainer.querySelectorAll('.yr-pill').forEach(p => p.classList.remove('active'));
            refreshMarkers();
        });

        function refreshMarkers() {
            const sel = document.getElementById('marketFilter').value;
            const query = document.getElementById('searchBox').value.toLowerCase();
            let visible = 0;
            markers.forEach(({ marker, comp }) => {
                const byLayer = activeLayers.has(comp.l);
                const byMarket = !sel || comp.m === sel;
                const byYear = !comp.yr || activeYears.has(comp.yr);
                const text = `${comp.n} ${comp.a} ${comp.m} ${comp.sm} ${comp.tenant||''} ${comp.landlord||''}`.toLowerCase();
                const bySearch = !query || text.includes(query);
                if (byLayer && byMarket && byYear && bySearch) {
                    layers[comp.l].addLayer(marker);
                    visible++;
                } else {
                    layers[comp.l].removeLayer(marker);
                }
            });
            document.getElementById('visibleCount').textContent = `${visible.toLocaleString()} / ${ALL.length.toLocaleString()} comps visible`;
        }

        document.getElementById('searchBox').addEventListener('input', refreshMarkers);
        document.getElementById('marketFilter').addEventListener('change', refreshMarkers);

        // Initial count
        refreshMarkers();

        // ==========================================
        // PARCEL QUERY LAYER
        // ==========================================
        const counties = [
            {
                name: 'Harris County', state: 'TX',
                bounds: { latMin:29.0, latMax:30.5, lngMin:-96.2, lngMax:-94.5 },
                url: 'https://www.gis.hctx.net/arcgis/rest/services/HCAD/Parcels/MapServer/0/query',
                fieldMap: { owner:'owner_name_1', address:'site_str_num,site_str_name,site_str_sfx', parcelId:'HCAD_NUM',
                    marketValue:'total_market_val', landValue:'land_value', acreage:'Acreage', sqft:'land_sqft',
                    legal:'legal_dscr_1', ownerDate:'new_owner_date', landUse:'land_use' }
            },
            {
                name: 'Dallas County', state: 'TX',
                bounds: { latMin:32.5, latMax:33.1, lngMin:-97.1, lngMax:-96.4 },
                url: 'https://gis.dallascityhall.com/arcgis/rest/services/Basemap/DallasTaxParcels/FeatureServer/0/query',
                fieldMap: { owner:'TAXPANAME1', address:'ST_NUM,ST_DIR,ST_NAME,ST_TYPE', parcelId:'ACCT',
                    legal:'LEGAL_1', city:'CITY' }
            },
            {
                name: 'Tarrant County', state: 'TX',
                bounds: { latMin:32.4, latMax:33.0, lngMin:-97.7, lngMax:-97.0 },
                url: 'https://mapit.tarrantcounty.com/arcgis/rest/services/Tax/TCProperty/MapServer/0/query',
                fieldMap: { owner:'OWNER_NAME', address:'SITUS_ADDR', parcelId:'ACCOUNT',
                    totalValue:'TOTAL_VALU', landValue:'LAND_VALUE', imprValue:'IMPR_VALUE',
                    acreage:'LAND_ACRES', sqft:'LAND_SQFT', yearBuilt:'YEAR_BUILT',
                    deedDate:'DEED_DATE', legal:'LEGAL_1' }
            },
            {
                name: 'Fulton County', state: 'GA',
                bounds: { latMin:33.5, latMax:34.1, lngMin:-84.6, lngMax:-84.2 },
                url: 'https://gismaps.fultoncountyga.gov/arcgispub2/rest/services/PropertyMapViewer/ParcelQuery/MapServer/0/query',
                fieldMap: { owner:'Owner', address:'Address', parcelId:'ParcelID',
                    totalAppr:'TotAppr', landAppr:'LandAppr', imprAppr:'ImprAppr',
                    totalAssess:'TotAssess', acreage:'LandAcres', landUse:'LUCode',
                    subdivision:'Subdiv' }
            },
            {
                name: 'Miami-Dade County', state: 'FL',
                bounds: { latMin:25.0, latMax:26.0, lngMin:-80.9, lngMax:-80.0 },
                url: 'https://gisweb.miamidade.gov/arcgis/rest/services/MD_LandInformation/MapServer/26/query',
                fieldMap: { owner:'TRUE_OWNER1', address:'TRUE_SITE_ADDR', city:'TRUE_SITE_CITY',
                    parcelId:'FOLIO', zoning:'PRIMARY_ZONE', yearBuilt:'YEAR_BUILT',
                    totalValue:'TOTAL_VAL_CUR', landValue:'LAND_VAL_CUR', bldgValue:'BUILDING_VAL_CUR',
                    lotSize:'LOT_SIZE', bldgArea:'BUILDING_GROSS_AREA', subdivision:'SUBDIVISION' }
            },
            {
                name: 'Hillsborough County', state: 'FL',
                bounds: { latMin:27.5, latMax:28.2, lngMin:-82.8, lngMax:-82.1 },
                url: 'https://maps.hillsboroughcounty.org/arcgis/rest/services/InfoLayers/HC_Parcels/FeatureServer/0/query',
                fieldMap: { owner:'OWNER', address:'SITE_ADDR', city:'SITE_CITY', parcelId:'FOLIO',
                    marketValue:'MARKET_VAL', taxValue:'TAX_VAL', landValue:'LAND', bldgValue:'BLDG',
                    saleDate:'S_DATE', saleAmt:'S_AMT', acreage:'ACREAGE', dorCode:'DOR_CODE' }
            },
            {
                name: 'Orange County', state: 'FL',
                bounds: { latMin:28.0, latMax:29.0, lngMin:-82.0, lngMax:-81.0 },
                url: 'https://www.ocgis.com/arcpub/rest/services/Map_Layers/Parcels/MapServer/0/query',
                fieldMap: { address:'SITE_ADDRESS', parcelId:'ASSESSMENT_NO', yearBuilt:'YEAR_BUILT' }
            }
        ];

        let parcelMode = false;
        let parcelLayer = null;

        function notify(msg, type, duration) {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.className = type || 'info';
            el.style.display = 'block';
            if (duration) setTimeout(() => el.style.display = 'none', duration);
        }

        function identifyCounty(lat, lng) {
            for (const c of counties) {
                const b = c.bounds;
                if (lat >= b.latMin && lat <= b.latMax && lng >= b.lngMin && lng <= b.lngMax) return c;
            }
            return null;
        }

        function fmtDollar(v) {
            if (v == null || v === '' || v === 0) return null;
            const n = Number(v);
            if (isNaN(n)) return String(v);
            return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function fmtDate(v) {
            if (!v) return null;
            if (typeof v === 'number') {
                const d = new Date(v);
                if (!isNaN(d)) return d.toLocaleDateString('en-US');
            }
            return String(v);
        }

        function buildAddress(attrs, fm) {
            if (fm.address && fm.address.includes(',')) {
                // Composite address from multiple fields
                const parts = fm.address.split(',').map(f => attrs[f.trim()]).filter(Boolean);
                return parts.join(' ');
            }
            return attrs[fm.address] || null;
        }

        function drawParcel(geometry) {
            if (parcelLayer) map.removeLayer(parcelLayer);
            if (!geometry || !geometry.rings) return;
            // Convert Esri rings to Leaflet LatLng arrays
            const polys = geometry.rings.map(ring => ring.map(pt => [pt[1], pt[0]]));
            parcelLayer = L.polygon(polys, {
                color: '#00ffff', weight: 3, fillColor: '#00ffff', fillOpacity: 0.12,
                dashArray: '6,4'
            }).addTo(map);
        }

        function showParcelDetail(attrs, county) {
            const fm = county.fieldMap;
            const addr = buildAddress(attrs, fm);
            const owner = attrs[fm.owner] || null;
            const pid = attrs[fm.parcelId] || null;
            const zoning = attrs[fm.zoning] || null;
            const yearBuilt = attrs[fm.yearBuilt] || null;
            const subdivision = attrs[fm.subdivision] || null;
            const legal = attrs[fm.legal] || null;

            // Values
            const mv = fmtDollar(attrs[fm.marketValue] || attrs[fm.totalAppr] || attrs[fm.totalValue]);
            const lv = fmtDollar(attrs[fm.landValue] || attrs[fm.landAppr]);
            const bv = fmtDollar(attrs[fm.bldgValue] || attrs[fm.imprValue] || attrs[fm.imprAppr]);
            const tv = fmtDollar(attrs[fm.taxValue] || attrs[fm.totalAssess]);
            const sa = fmtDollar(attrs[fm.saleAmt]);
            const sd = fmtDate(attrs[fm.saleDate] || attrs[fm.ownerDate] || attrs[fm.deedDate]);
            const ac = attrs[fm.acreage] ? Number(attrs[fm.acreage]).toFixed(2) + ' AC' : null;
            const sqft = attrs[fm.sqft] ? Number(attrs[fm.sqft]).toLocaleString() + ' SF' : null;
            const lot = attrs[fm.lotSize] ? Number(attrs[fm.lotSize]).toLocaleString() + ' SF' : null;
            const bldgArea = attrs[fm.bldgArea] ? Number(attrs[fm.bldgArea]).toLocaleString() + ' SF' : null;
            const city = attrs[fm.city] || null;

            const rows = [
                ['Owner', owner],
                ['Address', [addr, city, county.state].filter(Boolean).join(', ')],
                ['Parcel ID', pid],
                ['Market/Appraised Value', mv],
                ['Land Value', lv],
                ['Building Value', bv],
                ['Tax/Assessed Value', tv],
                ['Last Sale Price', sa],
                ['Last Sale/Deed Date', sd],
                ['Land Area', ac || sqft || lot],
                ['Building Area', bldgArea],
                ['Year Built', yearBuilt],
                ['Zoning', zoning],
                ['Subdivision', subdivision],
                ['Legal Description', legal],
            ].filter(([, v]) => v != null && v !== '' && v !== 'null');

            const html = `
                <h2>Parcel Query Result</h2>
                <span class="badge" style="background:#00e5ff30;color:#00e5ff;border:1px solid #00e5ff80">${county.name}</span>
                <div class="detail-grid" style="margin-top:10px;">
                    ${rows.map(([label, val]) => {
                        const isPrice = /value|price|sale/i.test(label);
                        return `<div class="detail-full"><div class="detail-label">${label}</div><div class="detail-value${isPrice?' price':''}">${val}</div></div>`;
                    }).join('')}
                </div>
                <div class="source" style="margin-top:12px;">Source: ${county.name} GIS &bull; Data may not reflect recent transactions</div>
            `;
            document.getElementById('detail-content').innerHTML = html;
        }

        async function queryParcel(latlng) {
            const county = identifyCounty(latlng.lat, latlng.lng);
            if (!county) {
                notify('No parcel data available for this location', 'error', 3000);
                return;
            }
            notify('Querying ' + county.name + ' parcels...', 'loading');

            const params = new URLSearchParams({
                geometry: `${latlng.lng},${latlng.lat}`,
                geometryType: 'esriGeometryPoint',
                spatialRel: 'esriSpatialRelIntersects',
                outFields: '*',
                returnGeometry: 'true',
                f: 'json',
                inSR: '4326',
                outSR: '4326'
            });

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const resp = await fetch(county.url + '?' + params, { signal: controller.signal });
                clearTimeout(timeout);
                const data = await resp.json();

                if (data.error) {
                    notify(`${county.name}: ${data.error.message || 'Query error'}`, 'error', 4000);
                    return;
                }
                if (!data.features || data.features.length === 0) {
                    notify('No parcel found at this location in ' + county.name, 'error', 3000);
                    return;
                }

                const feature = data.features[0];
                drawParcel(feature.geometry);
                showParcelDetail(feature.attributes, county);
                document.getElementById('notification').style.display = 'none';
            } catch (e) {
                if (e.name === 'AbortError') {
                    notify(`${county.name} query timed out. Try again later.`, 'error', 4000);
                } else {
                    // Likely CORS — some county endpoints may block cross-origin requests
                    notify(`${county.name} parcel data unavailable (may be CORS-blocked). Try again later.`, 'error', 4000);
                }
            }
        }

        // Toggle button
        const parcelBtn = document.getElementById('parcelBtn');
        parcelBtn.addEventListener('click', () => {
            parcelMode = !parcelMode;
            parcelBtn.classList.toggle('active', parcelMode);
            document.getElementById('map').classList.toggle('parcel-crosshair', parcelMode);
            if (!parcelMode && parcelLayer) {
                map.removeLayer(parcelLayer);
                parcelLayer = null;
            }
        });

        // Map click handler — only fires in parcel mode
        map.on('click', (e) => {
            if (parcelMode) queryParcel(e.latlng);
        });

    </script>
</body>
</html>
