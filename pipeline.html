<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COFE Properties — Deal Pipeline</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1220; color:#e2e8f0; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

header {
  background:#1e1e2e; border-bottom:1px solid #2a2a4a; padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
header .left { display:flex; align-items:center; gap:16px; }
header .back { color:#63b3ed; text-decoration:none; font-size:13px; font-weight:600; transition:color .15s; }
header .back:hover { color:#90cdf4; }
header h1 { font-size:18px; font-weight:700; color:#e2e8f0; }
header h1 span { color:#f6ad55; }
header .actions { display:flex; gap:10px; }
header .btn {
  padding:8px 16px; border-radius:6px; font-size:12px; font-weight:600;
  cursor:pointer; border:1px solid #3a3a5c; transition:all .15s;
}
.btn-add { background:#16162a; color:#a855f7; }
.btn-add:hover { background:#1e1e3e; }
.btn-ai { background:#16162a; color:#4ade80; }
.btn-ai:hover { background:#1e1e3e; }

.summary {
  padding:12px 24px; display:flex; gap:20px; flex-wrap:wrap; font-size:12px; color:#94a3b8;
}
.summary .stat { display:flex; gap:4px; }
.summary .stat-val { color:#e2e8f0; font-weight:600; }

.grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
  gap:16px; padding:16px 24px 32px;
}

.card {
  background:#1e1e2e; border:1px solid #2a2a4a; border-radius:10px;
  padding:18px; transition:border-color .15s; display:flex; flex-direction:column; gap:10px;
}
.card:hover { border-color:#a855f7; }

.card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.card-name { font-size:14px; font-weight:700; color:#e2e8f0; line-height:1.3; }
.card-market { font-size:11px; color:#94a3b8; margin-top:2px; }

.status-badge {
  font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px;
  white-space:nowrap; text-transform:uppercase; letter-spacing:.3px;
}
.status-uc { background:#f6ad5533; color:#f6ad55; }
.status-review { background:#63b3ed33; color:#63b3ed; }
.status-loi { background:#a855f733; color:#a855f7; }
.status-dead { background:#f5656533; color:#f56565; }
.status-other { background:#4ade8033; color:#4ade80; }

.type-badge {
  font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px;
  text-transform:uppercase; letter-spacing:.3px; margin-left:6px;
}
.type-ios { background:#a855f733; color:#a855f7; }
.type-ind { background:#6366f133; color:#6366f1; }

.card-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.card-stat { font-size:11px; }
.card-stat-label { color:#94a3b8; }
.card-stat-val { color:#e2e8f0; font-weight:600; }

.card-footer { margin-top:auto; padding-top:8px; border-top:1px solid #2a2a4a; display:flex; justify-content:space-between; align-items:center; }
.card-sub { font-size:10px; color:#64748b; }
.view-link {
  font-size:11px; color:#63b3ed; text-decoration:none; font-weight:600; transition:color .15s;
}
.view-link:hover { color:#90cdf4; }

.empty {
  text-align:center; padding:80px 24px; color:#64748b; font-size:14px;
}

/* Filter bar */
.filter-bar {
  padding:12px 24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid #2a2a4a; background:#161628;
}
.filter-bar label { font-size:10px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:.8px; }
.filter-bar select {
  padding:6px 10px; font-size:12px; border-radius:6px;
  border:1px solid #3a3a5c; background:#16162a; color:#e0e0e0; outline:none;
}
.filter-bar select:focus { border-color:#3b82f6; }
.filter-count { margin-left:auto; font-size:12px; color:#64748b; }
.filter-count strong { color:#63b3ed; }

/* Status dropdown on card */
.status-select {
  font-size:10px; font-weight:700; padding:3px 6px; border-radius:4px;
  border:1px solid #3a3a5c; background:#16162a; color:#e0e0e0;
  cursor:pointer; outline:none; text-transform:uppercase; letter-spacing:.3px;
}
.status-select:focus { border-color:#a855f7; }
</style>
</head>
<body>

<header>
  <div class="left">
    <a href="index.html" class="back">&#8592; Back to Map</a>
    <h1><span>COFE</span> Properties &mdash; Deal Pipeline</h1>
  </div>
  <div class="actions">
    <button class="btn btn-add" onclick="alert('Coming in Phase 2')">+ Add Deal</button>
  </div>
</header>

<div class="filter-bar">
  <label>Status</label>
  <select id="filterStatus">
    <option value="active">Active</option>
    <option value="all">All</option>
    <option value="Under Contract">Under Contract</option>
    <option value="Reviewing">Reviewing</option>
    <option value="LOI">LOI</option>
    <option value="Passed">Passed</option>
    <option value="Dead">Dead</option>
  </select>
  <label>Type</label>
  <select id="filterType">
    <option value="">All Types</option>
    <option value="ios_pipeline">IOS</option>
    <option value="ind_pipeline">Industrial</option>
  </select>
  <div class="filter-count">Showing <strong id="showCount">0</strong> deals</div>
</div>
<div class="summary" id="summary"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">No pipeline deals found.</div>

<script>
(function() {
  const STATUSES = ['Under Contract', 'Reviewing', 'LOI', 'Passed', 'Dead'];
  const HIDDEN_STATUSES = ['passed', 'dead']; // hidden in "Active" filter

  // Local status overrides (browser-side, persists until DB sync)
  function getOverrides() {
    try { return JSON.parse(localStorage.getItem('pipeline_status_overrides') || '{}'); } catch { return {}; }
  }
  function setOverride(rowId, status) {
    const o = getOverrides();
    o[rowId] = status;
    localStorage.setItem('pipeline_status_overrides', JSON.stringify(o));
  }
  function getStatus(deal) {
    const o = getOverrides();
    return o[deal.row] || deal.status || 'Unknown';
  }

  function statusClass(s) {
    if (!s) return 'status-other';
    const l = s.toLowerCase();
    if (l.includes('under contract')) return 'status-uc';
    if (l.includes('review')) return 'status-review';
    if (l.includes('loi')) return 'status-loi';
    if (l.includes('dead') || l.includes('pass')) return 'status-dead';
    return 'status-other';
  }

  let allDeals = [];

  function renderDeals() {
    const statusFilter = document.getElementById('filterStatus').value;
    const typeFilter = document.getElementById('filterType').value;
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');

    let filtered = allDeals.filter(d => {
      const st = getStatus(d).toLowerCase();
      if (statusFilter === 'active') {
        if (HIDDEN_STATUSES.some(h => st.includes(h))) return false;
      } else if (statusFilter !== 'all') {
        if (!st.includes(statusFilter.toLowerCase())) return false;
      }
      if (typeFilter && d.l !== typeFilter) return false;
      return true;
    });

    document.getElementById('showCount').textContent = filtered.length;

    // Summary (always based on all deals)
    const total = allDeals.length;
    const iosCount = allDeals.filter(d => d.l === 'ios_pipeline').length;
    const indCount = allDeals.filter(d => d.l === 'ind_pipeline').length;
    const activeCount = allDeals.filter(d => !HIDDEN_STATUSES.some(h => getStatus(d).toLowerCase().includes(h))).length;
    const passedCount = total - activeCount;
    document.getElementById('summary').innerHTML =
      `<div class="stat">Total: <span class="stat-val">${total}</span></div>` +
      `<div class="stat">Active: <span class="stat-val">${activeCount}</span></div>` +
      `<div class="stat">IOS: <span class="stat-val">${iosCount}</span></div>` +
      `<div class="stat">Industrial: <span class="stat-val">${indCount}</span></div>` +
      `<div class="stat">Passed/Dead: <span class="stat-val">${passedCount}</span></div>`;

    grid.innerHTML = '';
    if (!filtered.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';

    filtered.forEach(d => {
      const status = getStatus(d);
      const isIOS = d.l === 'ios_pipeline';
      const typeBadge = isIOS ? '<span class="type-badge type-ios">IOS</span>' : '<span class="type-badge type-ind">Industrial</span>';
      const mapUrl = d.lat && d.lng ? `index.html?fly=${d.lat},${d.lng}&row=${d.row}` : null;

      // Build status dropdown
      let statusOptions = STATUSES.map(s =>
        `<option value="${s}"${s.toLowerCase() === status.toLowerCase() ? ' selected' : ''}>${s}</option>`
      ).join('');
      if (!STATUSES.some(s => s.toLowerCase() === status.toLowerCase())) {
        statusOptions = `<option value="${status}" selected>${status}</option>` + statusOptions;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-name">${d.n || d.a || 'Untitled'}${typeBadge}</div>
              <div class="card-market">${d.m || ''}${d.sm ? ' &bull; ' + d.sm : ''}</div>
            </div>
            <select class="status-select ${statusClass(status)}" data-row="${d.row}">
              ${statusOptions}
            </select>
          </div>
          <div class="card-stats">
            <div class="card-stat"><span class="card-stat-label">Building SF</span><br><span class="card-stat-val">${d.sf || '—'}</span></div>
            <div class="card-stat"><span class="card-stat-label">Asking Price</span><br><span class="card-stat-val">${d.p || '—'}</span></div>
            <div class="card-stat"><span class="card-stat-label">Total Acreage</span><br><span class="card-stat-val">${d.total_ac ? d.total_ac + ' AC' : '—'}</span></div>
            <div class="card-stat"><span class="card-stat-label">Target Price</span><br><span class="card-stat-val">${d.target || '—'}</span></div>
            <div class="card-stat"><span class="card-stat-label">Price/Usable AC</span><br><span class="card-stat-val">${d.price_usable_ac || '—'}</span></div>
            <div class="card-stat"><span class="card-stat-label">Zoning</span><br><span class="card-stat-val">${d.zoning || '—'}</span></div>
          </div>
          <div class="card-footer">
            <span class="card-sub">${d.year_built ? 'Built ' + d.year_built : ''}</span>
            ${mapUrl ? '<a href="' + mapUrl + '" class="view-link">View on Map &#8594;</a>' : '<span class="card-sub">No coordinates</span>'}
          </div>`;
      grid.appendChild(card);
    });

    // Attach status change listeners
    grid.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', function() {
        setOverride(this.dataset.row, this.value);
        renderDeals();
      });
    });
  }

  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      allDeals = data.filter(d => d.l === 'ios_pipeline' || d.l === 'ind_pipeline');
      if (!allDeals.length) { document.getElementById('empty').style.display = ''; return; }
      renderDeals();
    })
    .catch(err => {
      document.getElementById('empty').style.display = '';
      document.getElementById('empty').textContent = 'Error loading data: ' + err.message;
    });

  document.getElementById('filterStatus').addEventListener('change', renderDeals);
  document.getElementById('filterType').addEventListener('change', renderDeals);
})();
</script>
<script src="chat.js"></script>
</body>
</html>
